<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | Health Care</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="header-main">
          <a class="brand" href="./index.html">Health Care</a>
          <nav class="site-nav">
            <a href="./diet.html" data-protected-link>Smart Diet</a>
            <a href="./diet-plan.html" data-protected-link>Diet Chart</a>
            <a href="./nutrients.html" data-protected-link>Nutrients</a>
            <a href="./bmi.html" data-protected-link>BMI</a>
          </nav>
        </div>
        <div class="header-actions">
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme" aria-pressed="false">
            <span class="theme-toggle-icon theme-toggle-sun" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.8"/>
                <path d="M12 2.5v2.3M12 19.2v2.3M4.8 4.8l1.6 1.6M17.6 17.6l1.6 1.6M2.5 12h2.3M19.2 12h2.3M4.8 19.2l1.6-1.6M17.6 6.4l1.6-1.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="theme-toggle-icon theme-toggle-moon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M18.5 14.6A7.5 7.5 0 1 1 9.4 5.5a6.2 6.2 0 0 0 9.1 9.1Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>
          <div class="auth-entry-links">
            <a class="auth-entry-link" href="./signin.html" data-auth-entry>Login</a>
          </div>
          <p id="auth-status" class="auth-label hidden"></p>
          <button id="logout-button" class="secondary-button hidden" type="button">Logout</button>
        </div>
      </header>

      <main class="single-panel-layout">
        <section class="panel auth-shell">
          <div class="section-title">
            <p class="eyebrow">Access</p>
            <h2>Create your account</h2>
          </div>
          <p class="page-copy">
            Register your account to access smart diet recommendations, nutrient guidance, and BMI tools.
          </p>
          <form id="signup-form" class="auth-form">
            <div class="field-group">
              <label for="signup-name">Full Name</label>
              <input id="signup-name" name="name" type="text" placeholder="Dr. Anika Rao" required />
            </div>
            <div class="field-group">
              <label for="signup-email">Email</label>
              <input id="signup-email" name="email" type="email" placeholder="clinic@example.com" required />
            </div>
            <div class="field-group">
              <label for="signup-password">Password</label>
              <input id="signup-password" name="password" type="password" placeholder="Create a password" required />
            </div>
            <button type="submit" class="primary-button auth-create-button auth-submit-button">Create Account</button>
          </form>
          <div class="auth-divider">
            <span>or</span>
          </div>
          <div class="auth-alt-actions">
            <button class="google-button" type="button" data-google-signin>
              Sign in with Google
            </button>
            <a class="secondary-link auth-switch-link" href="./signin.html">Back to Login</a>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <button class="credit-button" type="button" data-project-credit>
          Designed By Nishu
        </button>
      </footer>
    </div>

    <script src="./firebase-config.js"></script>
    <script src="./app.js"></script>
    <script type="module" src="./firebase-auth.js"></script>
  </body>
</html>
