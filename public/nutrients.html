<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nutrients | Health Care</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="header-main">
          <a class="brand" href="./index.html">Health Care</a>
          <nav class="site-nav">
            <a href="./reports.html" data-protected-link>Reports</a>
            <a class="active" href="./nutrients.html">Nutrients</a>
            <a href="./bmi.html" data-protected-link>BMI</a>
          </nav>
        </div>
        <div class="header-actions">
          <label class="theme-switcher" for="theme-select">
            <span>Theme</span>
            <select id="theme-select" aria-label="Theme mode">
              <option value="system">System</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
          <div class="auth-entry-links">
            <a class="auth-entry-link" href="./signin.html" data-auth-entry>Login</a>
          </div>
          <p id="auth-status" class="auth-label hidden"></p>
          <button id="logout-button" class="secondary-button hidden" type="button">Logout</button>
        </div>
      </header>

      <main class="single-panel-layout" data-protected-page>
        <section class="panel tool-shell">
          <div class="section-title">
            <p class="eyebrow">Nutrition</p>
            <h2>Find age-based nutrients</h2>
          </div>
          <p class="page-copy">
            Enter an age to see a general guide for important nutrients during
            that stage of life.
          </p>
          <form id="nutrient-form" class="compact-form">
            <div class="field-group">
              <label for="nutrient-age">Enter Age</label>
              <input id="nutrient-age" type="number" min="0" placeholder="Enter age" required />
            </div>
            <button type="submit" class="primary-button">Check Nutrients</button>
          </form>
          <div id="nutrient-result" class="result-card">
            Nutrient guidance will appear here.
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <button class="credit-button" type="button" data-project-credit>
          Designed By Nishu
        </button>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
